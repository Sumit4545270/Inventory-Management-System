name: Repo Cleanup

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write   # ✅ THIS FIXES YOUR ERROR

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # updated version

      - name: Run script
        run: node scripts/cleanup-check.js

      - name: Commit report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add unused-files.json
          git commit -m "cleanup report" || echo "No changes"
          git push
